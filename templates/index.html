<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <title>HLTV Demo Downloader</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #2b6ea4, #ffffff);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #fff;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 30px;
      color: #ffffff;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
    }

    form {
      background: #ffffff;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 400px;
    }

    input[type="text"] {
      padding: 10px 15px;
      font-size: 1rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      outline: none;
    }

    input[type="submit"] {
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 500;
      background-color: #2b6ea4;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    input[type="submit"]:hover {
      background-color: #204f7b;
    }
  </style>
</head>
<body>
  <h1>HLTV Demo Downloader</h1>
  <form action="/" method="POST">
    <input type="text" placeholder="URL" name="content" />
    <input type="submit" value="Submit" />
  </form>
</body>
</html>
